<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍜 北京高校美食地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ── 全局 Reset & 变量 ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:       #f4f5f7;
      --bg-sidebar:    #ffffff;
      --bg-card:       #ffffff;
      --bg-tag:        #fff3e0;
      --text-primary:  #1a1a2e;
      --text-secondary:#6b7280;
      --text-tag:      #e65100;
      --accent:        #ff6b35;
      --accent-soft:   #fff0eb;
      --star-bg:       #22c55e;
      --border:        #e8eaed;
      --shadow-card:   0 2px 12px rgba(0,0,0,.08);
      --shadow-hover:  0 8px 28px rgba(0,0,0,.14);
      --header-h:      64px;
      --sidebar-w:     380px;
      --radius-card:   16px;
      --radius-tag:    20px;
      --transition:    .25s cubic-bezier(.4,0,.2,1);
    }

    /* ── 深色模式变量 ──────────────────────────────────── */
    body.dark {
      --bg-page:       #0f1117;
      --bg-sidebar:    #1a1d27;
      --bg-card:       #242736;
      --bg-tag:        #2d2016;
      --text-primary:  #f0f0f5;
      --text-secondary:#9ca3af;
      --text-tag:      #fb923c;
      --accent:        #ff7849;
      --accent-soft:   #2a1a12;
      --border:        #2e3140;
      --shadow-card:   0 2px 12px rgba(0,0,0,.35);
      --shadow-hover:  0 8px 28px rgba(0,0,0,.5);
    }

    html, body { 
      height: 100%; 
      font-family: 'PingFang SC','Segoe UI',system-ui,sans-serif; 
      background: var(--bg-page); 
      color: var(--text-primary); 
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--header-h);
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      backdrop-filter: blur(12px);
      transition: background var(--transition), border-color var(--transition);
    }

    .header-logo {
      display: flex; align-items: center; gap: 10px; font-weight: 700;
      font-size: 1.15rem; color: var(--text-primary);
    }

    .header-logo .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg,#ff6b35,#f7931e);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; box-shadow: 0 3px 8px rgba(255,107,53,.4);
    }

    .header-right { 
      display: flex; align-items: center; gap: 12px; 
    }

    .header-stats {
      font-size: .78rem; color: var(--text-secondary);
      background: var(--bg-page); padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border);
    }

    .header-stats span { 
      color: var(--accent); font-weight: 700; 
    }

    /* 深色模式切换按钮 */
    #darkToggle {
      width: 44px; height: 26px; border-radius: 13px; border: none; cursor: pointer;
      background: var(--border); position: relative;
      transition: background var(--transition);
      flex-shrink: 0;
    }

    #darkToggle::after {
      content: '☀️'; position: absolute; left: 3px; top: 3px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--bg-card); display: flex; align-items: center; justify-content: center;
      font-size: .65rem; line-height: 20px; text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
      transition: left var(--transition), content var(--transition);
    }

    body.dark #darkToggle { background: #4f46e5; }
    body.dark #darkToggle::after { left: 21px; content: '🌙'; }

    /* ── 主体布局 ─────────────────────────────────────── */
    .app-body {
      display: flex; height: 100vh; padding-top: var(--header-h);
    }

    /* ── 左侧列表 ─────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto; overflow-x: hidden;
      transition: background var(--transition), border-color var(--transition);
      scroll-behavior: smooth;
    }

    /* 自定义滚动条 */
    .sidebar::-webkit-scrollbar { width: 5px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { 
      background: var(--border); 
      border-radius: 3px; 
    }

    /* ── 大学分组标题（sticky吸顶）──────────────────────── */
    .uni-group { margin-bottom: 8px; }

    .uni-header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-sidebar);
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      transition: background var(--transition), border-color var(--transition);
      backdrop-filter: blur(8px);
    }

    .uni-avatar {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg,#667eea,#764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
      box-shadow: 0 3px 8px rgba(102,126,234,.35);
    }

    .uni-info { flex: 1; min-width: 0; }

    .uni-name {
      font-size: .92rem; font-weight: 700; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .uni-meta { 
      font-size: .72rem; color: var(--text-secondary); 
      margin-top: 2px; 
    }

    .uni-count {
      background: var(--accent); color: #fff;
      font-size: .7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px; flex-shrink: 0;
    }

    /* ── 餐厅卡片（横向布局）───────────────────────────── */
    .card-list { 
      padding: 10px 16px 16px; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
    }

    .restaurant-card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      padding: 13px 14px;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition),
                  background var(--transition), border-color var(--transition);
      position: relative; overflow: hidden;
    }

    .restaurant-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent); border-radius: 3px 0 0 3px;
      opacity: 0; transition: opacity var(--transition);
    }

    .restaurant-card:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: var(--shadow-hover);
    }

    .restaurant-card:hover::before { opacity: 1; }

    .restaurant-card.active {
      border-color: var(--accent); 
      box-shadow: 0 0 0 2px var(--accent-soft), var(--shadow-hover);
    }

    .restaurant-card.active::before { opacity: 1; }

    /* 圆形图片占位符 */
    .card-avatar {
      width: 58px; height: 58px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 3px 10px rgba(0,0,0,.12);
      position: relative;
    }

    .card-avatar .avatar-ring {
      position: absolute; inset: -2px; border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color var(--transition);
    }

    .restaurant-card:hover .avatar-ring,
    .restaurant-card.active .avatar-ring {
      border-color: var(--accent);
    }

    /* 右侧文字区 */
    .card-body { flex: 1; min-width: 0; }

    .card-top { 
      display: flex; align-items: center; 
      justify-content: space-between; gap: 8px; 
    }

    .card-name {
      font-size: .95rem; font-weight: 700; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }

    /* 评分徽章 */
    .rating-badge {
      background: var(--star-bg); color: #fff;
      font-size: .72rem; font-weight: 700;
      padding: 3px 8px; border-radius: 20px;
      display: flex; align-items: center; gap: 3px;
      flex-shrink: 0; white-space: nowrap;
    }

    .rating-stars { 
      letter-spacing: -.5px; 
      font-size: .65rem; 
    }

    .card-cuisine {
      font-size: .75rem; color: var(--text-secondary); 
      margin-top: 4px;
    }

    /* 标签区 */
    .card-tags { 
      display: flex; flex-wrap: wrap; gap: 5px; 
      margin-top: 7px; 
    }

    .tag {
      background: var(--bg-tag); color: var(--text-tag);
      font-size: .68rem; font-weight: 500;
      padding: 3px 9px; border-radius: var(--radius-tag);
      border: 1px solid transparent;
      transition: background var(--transition);
    }

    .tag.hot   { background: #fef2f2; color: #dc2626; }
    .tag.new   { background: #eff6ff; color: #2563eb; }
    .tag.cheap { background: #f0fdf4; color: #16a34a; }

    body.dark .tag.hot   { background: #2d1414; color: #f87171; }
    body.dark .tag.new   { background: #141b2d; color: #60a5fa; }
    body.dark .tag.cheap { background: #142016; color: #4ade80; }

    .card-bottom { 
      display: flex; align-items: center; 
      justify-content: space-between; margin-top: 7px; 
    }

    .card-price { 
      font-size: .75rem; 
      color: var(--text-secondary); 
    }

    .card-price strong { 
      color: var(--accent); 
      font-size: .85rem; 
    }

    .card-dist { 
      font-size: .7rem; 
      color: var(--text-secondary); 
      display: flex; align-items: center; gap: 3px; 
    }

    /* ── 地图区域 ──────────────────────────────────────── */
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* Leaflet popup 美化 */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 8px 28px rgba(0,0,0,.18) !important;
      padding: 0 !important; 
      overflow: hidden;
    }

    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }

    .popup-inner { 
      padding: 16px 18px; 
      min-width: 200px; 
    }

    .popup-head { 
      display: flex; align-items: center; 
      gap: 10px; margin-bottom: 10px; 
    }

    .popup-emoji { font-size: 1.8rem; }

    .popup-title { 
      font-weight: 700; 
      font-size: .95rem; 
      color: #1a1a2e; 
    }

    .popup-uni { 
      font-size: .72rem; 
      color: #6b7280; 
      margin-top: 2px; 
    }

    .popup-row { 
      display: flex; 
      gap: 6px; 
      flex-wrap: wrap; 
      margin-top: 8px; 
    }

    .popup-tag { 
      background: #fff3e0; 
      color: #e65100; 
      font-size: .68rem; 
      padding: 2px 8px; 
      border-radius: 10px; 
    }

    .popup-rating { 
      background: #22c55e; 
      color: #fff; 
      font-size: .72rem; 
      font-weight: 700; 
      padding: 2px 8px; 
      border-radius: 10px; 
    }

    /* ── 地图浮层按钮 ─────────────────────────────────── */
    .map-btn {
      position: absolute; z-index: 500;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      padding: 9px 14px;
      font-size: .82rem; font-weight: 600;
      color: var(--text-primary);
      transition: transform var(--transition), box-shadow var(--transition),
                  background var(--transition);
    }

    .map-btn:hover { 
      transform: translateY(-1px); 
      box-shadow: var(--shadow-hover); 
    }

    #locateBtn { 
      top: 16px; 
      right: 16px; 
      color: var(--accent); 
    }

    #locateBtn .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(255,107,53,.6);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,107,53,.6); }
      70%  { box-shadow: 0 0 0 8px rgba(255,107,53,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
    }

    /* 地图图例 */
    .map-legend {
      position: absolute; z-index: 500; bottom: 32px; right: 16px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: var(--shadow-card);
      padding: 12px 16px; font-size: .75rem;
      color: var(--text-secondary);
      transition: background var(--transition), border-color var(--transition);
    }

    .map-legend .leg-title { 
      font-weight: 700; 
      color: var(--text-primary); 
      margin-bottom: 8px; 
      font-size: .8rem; 
    }

    .leg-item { 
      display: flex; align-items: center; 
      gap: 7px; margin-top: 5px; 
    }

    .leg-dot { 
      width: 12px; height: 12px; 
      border-radius: 50%; flex-shrink: 0; 
    }

    /* ── 响应式 ───────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 100vw; }
      .app-body { flex-direction: column; }
      .sidebar { 
        width: 100%; 
        height: 45vh; 
        border-right: none; 
        border-bottom: 1px solid var(--border); 
      }
      .map-container { height: 55vh; }
    }
  </style>
</head>
<body>

</div>

/* ══════════════════════════════════════════════════════════
   辅助函数
══════════════════════════════════════════════════════════ */
function starsHtml(r) {
  const full = Math.floor(r);
  const half = (r - full) >= .5;
  let s = '★'.repeat(full);
  if (half) s += '½';
  s += '☆'.repeat(5 - full - (half?1:0));
  return s;
}

function tagClass(c) {
  return c ? ` ${c}` : '';
}

function gradientForEmoji(emoji) {
  const map = {
    '🍱':'linear-gradient(135deg,#fdba74,#f97316)',
    '🥢':'linear-gradient(135deg,#fca5a5,#ef4444)',
    '🍵':'linear-gradient(135deg,#86efac,#22c55e)',
    '🍛':'linear-gradient(135deg,#fde68a,#f59e0b)',
    '🌶️':'linear-gradient(135deg,#fca5a5,#dc2626)',
    '☕':'linear-gradient(135deg,#d6b48a,#92400e)',
    '🥗':'linear-gradient(135deg,#a7f3d0,#059669)',
    '🍜':'linear-gradient(135deg,#fcd34d,#d97706)',
    '🍲':'linear-gradient(135deg,#c4b5fd,#7c3aed)',
    '🥩':'linear-gradient(135deg,#fca5a5,#b91c1c)',
  };
  return map[emoji] || 'linear-gradient(135deg,#e2e8f0,#94a3b8)';
}

/* ══════════════════════════════════════════════════════════
   渲染侧边栏
══════════════════════════════════════════════════════════ */
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let totalR = 0;
  let html = '';

  DATA.forEach(uniData => {
    totalR += uniData.restaurants.length;
    html += `
    <div class="uni-group" data-uni="${uniData.uni}">
      <div class="uni-header">
        <div class="uni-avatar" style="background:linear-gradient(135deg,${uniData.uniColor},${uniData.uniColor}99)">
          ${uniData.uniEmoji}
        </div>
        <div class="uni-info">
          <div class="uni-name">${uniData.uni}</div>
          <div class="uni-meta">📍 附近 ${uniData.restaurants.length} 家推荐餐厅</div>
        </div>
        <div class="uni-count">${uniData.restaurants.length}</div>
      </div>
      <div class="card-list">
        ${uniData.restaurants.map(r => `
          <div class="restaurant-card" id="card-${r.id}" onclick="selectCard(${r.id},${r.lat},${r.lng})">
            <div class="card-avatar" style="background:${gradientForEmoji(r.emoji)}">
              <span>${r.emoji}</span>
              <div class="avatar-ring"></div>
            </div>
            <div class="card-body">
              <div class="card-top">
                <div class="card-name">${r.name}</div>
                <div class="rating-badge">
                  <span class="rating-stars">★</span>${r.rating}
                </div>
              </div>
              <div class="card-cuisine">${r.cuisine}</div>
              <div class="card-tags">
                ${r.tags.map(t=>`<span class="tag${tagClass(t.c)}">${t.t}</span>`).join('')}
              </div>
              <div class="card-bottom">
                <div class="card-price">人均 <strong>${r.price}</strong></div>
                <div class="card-dist">📍 ${r.dist}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  sidebar.innerHTML = html;
  document.getElementById('totalCount').textContent = totalR;
  document.getElementById('uniCount').textContent = DATA.length;
}

/* ══════════════════════════════════════════════════════════
   Leaflet 地图初始化
══════════════════════════════════════════════════════════ */
let map, markersById = {}, markersGroup = [], activeId = null;

function initMap() {
  // 创建地图实例
  map = L.map('map', {
    center: [39.9861, 116.3282],
    zoom: 14,
    zoomControl: true,
  });

  // OpenStreetMap 瓦片层
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // 添加所有餐厅标记
  DATA.forEach(uniData => {
    uniData.restaurants.forEach(r => {
      const icon = L.divIcon({
        className: '',
        html: `<div style="
          background:linear-gradient(135deg,#ff6b35,#f7931e);
          color:#fff;font-size:1rem;width:36px;height:36px;
          border-radius:50% 50% 50% 0;transform:rotate(-45deg);
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 3px 10px rgba(0,0,0,.3);
          border:2px solid #fff;
        ">
          <span style="transform:rotate(45deg)">${r.emoji}</span>
        </div>`,
        iconSize: [36, 36],
        className: 'custom-marker'
      });

      const marker = L.marker([r.lat, r.lng], { icon })
        .addTo(map)
        .bindPopup(`
          <div class="popup-inner">
            <div class="popup-head">
              <div class="popup-emoji">${r.emoji}</div>
              <div>
                <div class="popup-title">${r.name}</div>
                <div class="popup-uni">${uniData.uni}</div>
              </div>
            </div>
            <div class="popup-row">
              <div class="popup-tag">🍽️ ${r.cuisine}</div>
              <div class="popup-rating">⭐ ${r.rating}</div>
            </div>
            <div style="margin-top:10px;font-size:.75rem;color:#666">
              📍 ${r.dist}<br/>
              💰 人均 ${r.price}
            </div>
          </div>
        `, {
          maxWidth: 280,
          className: 'custom-popup'
        });

      markersById[r.id] = { marker, lat: r.lat, lng: r.lng };
      markersGroup.push(marker);
    });

    // 添加高校中心标记
    const uniIcon = L.divIcon({
      className: '',
      html: `<div style="
        background:linear-gradient(135deg,${uniData.uniColor},${uniData.uniColor}88);
        color:#fff;font-size:1.2rem;width:48px;height:48px;
        border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 4px 12px rgba(0,0,0,.25);
        border:3px solid #fff;
      ">
        ${uniData.uniEmoji}
      </div>`,
      iconSize: [48, 48]
    });

    L.marker([uniData.uniLat, uniData.uniLng], { icon: uniIcon })
      .addTo(map)
      .bindPopup(`<div class="popup-inner"><div style="font-weight:700;font-size:.95rem">${uniData.uni}</div></div>`, {
        maxWidth: 200
      });
  });
}

/* ══════════════════════════════════════════════════════════
   卡片选择和地图交互
══════════════════════════════════════════════════════════ */
function selectCard(restaurantId, lat, lng) {
  // 移除之前的活跃状态
  if (activeId !== null) {
    const oldCard = document.getElementById(`card-${activeId}`);
    if (oldCard) oldCard.classList.remove('active');
  }

  // 添加新的活跃状态
  const newCard = document.getElementById(`card-${restaurantId}`);
  if (newCard) {
    newCard.classList.add('active');
    // 滚动到卡片
    newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  activeId = restaurantId;

  // 地图飞到该位置
  if (map && markersById[restaurantId]) {
    map.flyTo([lat, lng], 16, { duration: 1 });
    setTimeout(() => {
      markersById[restaurantId].marker.openPopup();
    }, 500);
  }
}

function flyToCenter() {
  if (!map || markersGroup.length === 0) return;

  // 计算所有标记的边界
  const group = new L.featureGroup(markersGroup);
  const bounds = group.getBounds();

  // 飞到中心，带一些缩放动画
  map.flyToBounds(bounds, { 
    padding: [50, 50], 
    maxZoom: 15,
    duration: 1.5 
  });
}

/* ══════════════════════════════════════════════════════════
   深色模式切换
══════════════════════════════════════════════════════════ */
const darkToggle = document.getElementById('darkToggle');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

// 检查本地存储
const savedDarkMode = localStorage.getItem('darkMode');
if (savedDarkMode !== null) {
  if (savedDarkMode === 'true') {
    document.body.classList.add('dark');
  }
} else if (prefersDark.matches) {
  document.body.classList.add('dark');
}

darkToggle.addEventListener('click', () => {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark);
});

// 监听系统主题变化
prefersDark.addEventListener('change', (e) => {
  if (localStorage.getItem('darkMode') === null) {
    if (e.matches) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.remove('dark');
    }
  }
});

/* ══════════════════════════════════════════════════════════
   初始化
══════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  initMap();
});
</script>
